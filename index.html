<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Simulasi Titrasi Lab Kimia</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Lexend:wght@400;600&display=swap" rel="stylesheet">

    <style>
        body {
            margin: 0; padding: 0; background-color: #1a1a1a;
            display: flex; justify-content: center; align-items: center;
            height: 100vh; overflow: hidden; font-family: 'Lexend', sans-serif;
            user-select: none;
        }
        #game-container { 
            position: relative; width: 100vw; max-width: 100%; 
            aspect-ratio: 16 / 9; background-color: #000; 
        }
        canvas { 
            width: 100%; height: 100%; display: block; image-rendering: pixelated; 
        }
        
        /* OVERLAYS UI */
        .overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background-color: rgba(0, 0, 0, 0.85); display: none;
            flex-direction: column; justify-content: center; align-items: center; gap: 15px; z-index: 10;
        }
        
        .menu-btn {
            font-family: 'Lexend', sans-serif; font-size: 1.2rem; font-weight: 600;
            padding: 10px 20px; background-color: #888888; color: white;
            border: 2px solid #555555; border-radius: 8px; cursor: pointer; width: 250px; text-align: center;
        }
        .menu-btn:hover { background-color: #a0a0a0; }
        .menu-btn:active { transform: scale(0.95); }

        #overfill-popup {
            position: relative; display: flex; flex-direction: column; align-items: center;
        }
        #overfill-img {
            width: 60%; min-width: 300px; image-rendering: pixelated;
        }
        #btn-ulangi {
            position: absolute; bottom: 12%; width: 45%; height: 25%;
            opacity: 0; cursor: pointer;
        }
        #alert-msg {
            position: absolute; bottom: 10%; left: 50%; transform: translateX(-50%);
            background: rgba(255,50,50,0.9); color: white; padding: 5px 15px;
            border-radius: 5px; font-size: 0.8rem; display: none; pointer-events: none; z-index: 5;
        }
        #loading-text {
            position: absolute; color: white; font-size: 1.5rem; 
            top: 50%; left: 50%; transform: translate(-50%, -50%);
        }
    </style>
</head>
<body>

    <div id="game-container">
        <canvas id="gameCanvas" width="256" height="144"></canvas>
        <div id="loading-text">Memuat Aset... 0%</div>
        <div id="alert-msg">Cairan tumpah ke meja!</div>
        
        <div id="menu-overlay" class="overlay">
            <button class="menu-btn" id="btn-keluar">Keluar</button>
            <button class="menu-btn" id="btn-lanjut">Lanjutkan Simulasi</button>
        </div>

        <div id="overfill-overlay" class="overlay">
            <div id="overfill-popup">
                <img src="popupg.png" id="overfill-img" alt="Overfill">
                <button id="btn-ulangi"></button>
            </div>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const alertMsg = document.getElementById('alert-msg');
        const loadingText = document.getElementById('loading-text');

        // --- SISTEM LOAD GAMBAR ---
        const images = {};
        const sources = {
            bg: 'kanvasmeja.png', ui: 'tombolmenu.png', popupg: 'popupg.png',
            b_closed: 'bit.png', b_open: 'bib.png', b_empty: 'bkb.png',
            p0: 'pv0.png', p1: 'pv1.png', p2: 'pv2.png', p3: 'pv3.png', p4: 'pv4.png', p5: 'pv5.png',
            l: 'l.png', la: 'la.png', laa: 'laa.png', laaa: 'laaa.png', laaaa: 'laaaa.png',
            lb: 'lb.png', lbb: 'lbb.png', lbbb: 'lbbb.png', lbbbb: 'lbbbb.png',
            lab: 'lab.png', laabb: 'laabb.png',
            ppb: 'ppb.png', ppp: 'ppp.png', pppb: 'pppb.png'
        };

        let loadedImages = 0;
        const totalImages = Object.keys(sources).length;

        for (let key in sources) {
            images[key] = new Image();
            images[key].src = sources[key];
            images[key].onload = () => { 
                loadedImages++; 
                loadingText.innerText = `Memuat Aset... ${Math.floor((loadedImages/totalImages)*100)}%`;
                if (loadedImages === totalImages) {
                    loadingText.style.display = 'none';
                    draw(); 
                }
            };
        }

        // --- STATE & UKURAN LOGIS (HITBOX & RENDER) ---
        // UI Menu (Lebar 16, Tinggi 32 untuk mengakomodasi 2 ikon atas bawah)
        const uiBtn = { x: 232, y: 4, w: 18, h: 36, menu_hitbox_h: 18 }; 

        let bottles, pipettes, flask, indicator;

        function initGame() {
            // Posisi disesuaikan dengan 'displayposisi.png'
            bottles = [
                { id: 'A', x: 45, y: 80, w: 35, h: 55, state: 'closed', capacity: 5 }, // HCl
                { id: 'B', x: 85, y: 80, w: 35, h: 55, state: 'closed', capacity: 5 }  // NaOH
            ];

            flask = { x: 135, y: 80, w: 40, h: 55, a: 0, b: 0, hasIndicator: false };

            indicator = {
                x: 190, y: 78, w: 28, h: 57, 
                cap_x: 190, cap_y: 78, cap_w: 28, cap_h: 28, // Tutup/Bulb PP
                isDetached: false, location: 'base' 
            };

            pipettes = [
                { id: 1, x: 8, y: 15, base_x: 8, base_y: 15, w: 18, h: 120, capacity: 0, tag: 'netral', location: 'rack' },
                { id: 2, x: 26, y: 15, base_x: 26, base_y: 15, w: 18, h: 120, capacity: 0, tag: 'netral', location: 'rack' }
            ];
        }

        initGame();

        let draggedObj = null; 
        let dragType = null;
        let dragOffsetX = 0, dragOffsetY = 0;

        // --- FUNGSI RENDER ---
        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            // 1. Gambar Background PAKSA penuh ke 256x144
            ctx.drawImage(images.bg, 0, 0, canvas.width, canvas.height);

            // 2. Gambar Botol PAKSA ke ukuran hitbox (w:35, h:55)
            bottles.forEach(b => {
                let img = images.b_closed;
                if (b.state === 'open') img = b.capacity > 0 ? images.b_open : images.b_empty;
                ctx.drawImage(img, b.x, b.y, b.w, b.h);
            });

            // 3. Gambar Labu PAKSA ke ukuran hitbox (w:40, h:55)
            ctx.drawImage(getFlaskSprite(), flask.x, flask.y, flask.w, flask.h);

            // 4. Gambar Indikator PAKSA ke ukuran hitbox
            if (indicator.isDetached) {
                // Gambar botol PP bawah saja
                ctx.drawImage(images.ppb, indicator.x, indicator.y, indicator.w, indicator.h); 
                // Gambar tutup PP yang sedang ditarik
                ctx.drawImage(images.ppp, indicator.cap_x, indicator.cap_y, indicator.cap_w, indicator.cap_h); 
            } else {
                ctx.drawImage(images.pppb, indicator.x, indicator.y, indicator.w, indicator.h); 
            }

            // 5. Gambar Pipet PAKSA ke ukuran hitbox (w:18, h:120)
            pipettes.forEach(p => {
                let pImg = images['p' + p.capacity];
                ctx.drawImage(pImg, p.x, p.y, p.w, p.h);
            });

            // 6. Gambar UI Tombol Menu PAKSA ke ukuran w:18, h:36
            ctx.drawImage(images.ui, uiBtn.x, uiBtn.y, uiBtn.w, uiBtn.h);

            requestAnimationFrame(draw);
        }

        function getFlaskSprite() {
            let total = flask.a + flask.b;
            if (total === 0) return images.l;
            if (!flask.hasIndicator) {
                if (total === 1) return images.la;
                if (total === 2) return images.laa;
                if (total === 3) return images.laaa;
                if (total === 4) return images.laaaa;
            } else {
                if (flask.a === flask.b) { 
                    if (total === 2) return images.lab;
                    if (total === 4) return images.laabb;
                } else if (flask.a > flask.b) {
                    if (total === 1) return images.la;
                    if (total === 2) return images.laa;
                    if (total === 3) return images.laaa;
                    if (total === 4) return images.laaaa;
                } else {
                    if (total === 1) return images.lb;
                    if (total === 2) return images.lbb;
                    if (total === 3) return images.lbbb;
                    if (total === 4) return images.lbbbb;
                }
            }
            return images.l; 
        }

        // --- LOGIKA INTERAKSI MOUSE (FIXED) ---
        canvas.addEventListener('mousedown', function(e) {
            const rect = canvas.getBoundingClientRect();
            // Kalkulasi skala yang lebih presisi
            const mouseX = (e.clientX - rect.left) * (canvas.width / rect.width);
            const mouseY = (e.clientY - rect.top) * (canvas.height / rect.height);

            // Cek Klik UI Menu (Hanya paruh atas gambar tombolmenu.png)
            if (mouseX >= uiBtn.x && mouseX <= uiBtn.x + uiBtn.w && 
                mouseY >= uiBtn.y && mouseY <= uiBtn.y + uiBtn.menu_hitbox_h) {
                document.getElementById('menu-overlay').style.display = 'flex'; return;
            }

            // Cek Interaksi Pipet
            for (let i = pipettes.length - 1; i >= 0; i--) {
                let p = pipettes[i];
                if (mouseX >= p.x && mouseX <= p.x + p.w && mouseY >= p.y && mouseY <= p.y + p.h) {
                    // Area Bulb / Pencetan pipet (35 pixel teratas)
                    if (mouseY <= p.y + 35) { 
                        handlePipetteBulb(p); return;
                    } else { 
                        // Area Drag / Kaca
                        draggedObj = p; dragType = 'pipette';
                        dragOffsetX = mouseX - p.x; dragOffsetY = mouseY - p.y;
                        return;
                    }
                }
            }

            // Cek Tutup Indikator PP
            let capX = indicator.isDetached ? indicator.cap_x : indicator.x;
            let capY = indicator.isDetached ? indicator.cap_y : indicator.y;
            
            if (mouseX >= capX && mouseX <= capX + indicator.cap_w && mouseY >= capY && mouseY <= capY + indicator.cap_h) {
                if (indicator.location === 'flask' && mouseY <= capY + 15) {
                    flask.hasIndicator = true;
                    console.log("Indikator diteteskan!");
                } else {
                    indicator.isDetached = true;
                    draggedObj = indicator; dragType = 'indicator';
                    dragOffsetX = mouseX - indicator.cap_x; dragOffsetY = mouseY - indicator.cap_y;
                }
                return;
            }

            // Cek Botol Buka/Tutup
            bottles.forEach(b => {
                if (mouseX >= b.x && mouseX <= b.x + b.w && mouseY >= b.y && mouseY <= b.y + b.h) {
                    b.state = (b.state === 'closed') ? 'open' : 'closed';
                }
            });
        });

        canvas.addEventListener('mousemove', function(e) {
            if (!draggedObj) return;
            const rect = canvas.getBoundingClientRect();
            const mouseX = (e.clientX - rect.left) * (canvas.width / rect.width);
            const mouseY = (e.clientY - rect.top) * (canvas.height / rect.height);

            if (dragType === 'pipette') {
                draggedObj.x = mouseX - dragOffsetX;
                draggedObj.y = mouseY - dragOffsetY;
            } else if (dragType === 'indicator') {
                draggedObj.cap_x = mouseX - dragOffsetX;
                draggedObj.cap_y = mouseY - dragOffsetY;
            }
        });

        canvas.addEventListener('mouseup', function(e) {
            if (!draggedObj) return;
            let droppedOnTarget = false;

            if (dragType === 'pipette') {
                let p = draggedObj;
                for (let b of bottles) {
                    if (checkOverlap(p, b)) {
                        if (p.tag === 'netral' || p.tag === b.id) {
                            p.x = b.x + 8; p.y = b.y - 45; p.location = b.id;
                            droppedOnTarget = true; break;
                        }
                    }
                }
                if (!droppedOnTarget && checkOverlap(p, flask)) {
                    p.x = flask.x + 10; p.y = flask.y - 50; p.location = 'flask';
                    droppedOnTarget = true;
                }
                if (!droppedOnTarget) {
                    if (p.capacity > 0) { p.capacity = 0; showLeakAlert(); }
                    p.x = p.base_x; p.y = p.base_y; p.location = 'rack';
                }
            } 
            else if (dragType === 'indicator') {
                let ind = draggedObj;
                let capRect = { x: ind.cap_x, y: ind.cap_y, w: ind.cap_w, h: ind.cap_h };
                if (checkOverlap(capRect, flask)) {
                    ind.cap_x = flask.x + 6; ind.cap_y = flask.y - 25;
                    ind.location = 'flask';
                } else {
                    ind.isDetached = false;
                    ind.cap_x = ind.x; ind.cap_y = ind.y;
                    ind.location = 'base';
                }
            }

            draggedObj = null; dragType = null;
        });

        // --- FUNGSI UTILITAS ---
        function checkOverlap(rect1, rect2) {
            return (rect1.x < rect2.x + rect2.w && rect1.x + rect1.w > rect2.x &&
                    rect1.y < rect2.y + rect2.h && rect1.y + rect1.h > rect2.y);
        }

        function showLeakAlert() {
            alertMsg.style.display = 'block';
            setTimeout(() => { alertMsg.style.display = 'none'; }, 2000);
        }

        function handlePipetteBulb(p) {
            let bottle = bottles.find(b => b.id === p.location);
            if (bottle) {
                if (bottle.state !== 'open') return; 
                if (bottle.capacity > 0 && p.capacity < 5) {
                    p.capacity++; bottle.capacity--;
                    p.tag = bottle.id; 
                }
            }
            else if (p.location === 'flask') {
                if (p.capacity > 1) { 
                    let totalFlask = flask.a + flask.b;
                    if (totalFlask >= 4) {
                        document.getElementById('overfill-overlay').style.display = 'flex';
                        return;
                    }
                    p.capacity--;
                    if (p.tag === 'A') flask.a++;
                    else if (p.tag === 'B') flask.b++;
                }
            }
        }

        // --- TOMBOL POPUP HTML ---
        document.getElementById('btn-lanjut').addEventListener('click', () => { 
            document.getElementById('menu-overlay').style.display = 'none'; 
        });
        document.getElementById('btn-keluar').addEventListener('click', () => { 
            alert("Keluar dari simulasi..."); 
        });
        document.getElementById('btn-ulangi').addEventListener('click', () => {
            initGame(); 
            document.getElementById('overfill-overlay').style.display = 'none';
        });

    </script>
</body>
</html>
