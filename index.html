<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Simulasi Titrasi Lab Kimia</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Lexend:wght@400;600&display=swap" rel="stylesheet">

    <style>
        body {
            margin: 0; padding: 0; background-color: #1a1a1a;
            display: flex; justify-content: center; align-items: center;
            height: 100vh; overflow: hidden; font-family: 'Lexend', sans-serif;
            user-select: none;
        }
        #game-container { 
            position: relative; width: 100vw; max-width: 100%; 
            aspect-ratio: 16 / 9; max-height: 100vh; background-color: #000; 
            margin: auto;
        }
        canvas { 
            width: 100%; height: 100%; display: block; 
            object-fit: contain; image-rendering: pixelated; 
            touch-action: none;
        }
        
        .overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background-color: rgba(0, 0, 0, 0.85); display: none;
            flex-direction: column; justify-content: center; align-items: center; gap: 15px; z-index: 10;
        }
        
        .menu-btn {
            font-family: 'Lexend', sans-serif; font-size: 1.2rem; font-weight: 600;
            padding: 10px 20px; background-color: #888888; color: white;
            border: 2px solid #555555; border-radius: 8px; cursor: pointer; width: 250px; text-align: center;
        }
        .menu-btn:hover { background-color: #a0a0a0; }
        .menu-btn:active { transform: scale(0.95); }

        #overfill-popup {
            position: relative; display: flex; flex-direction: column; align-items: center;
        }
        #overfill-img {
            width: 60%; min-width: 300px; image-rendering: pixelated;
        }
        #btn-ulangi {
            position: absolute; bottom: 12%; width: 45%; height: 25%;
            opacity: 0; cursor: pointer;
        }
        #alert-msg {
            position: absolute; bottom: 10%; left: 50%; transform: translateX(-50%);
            background: rgba(255,50,50,0.9); color: white; padding: 5px 15px;
            border-radius: 5px; font-size: 0.8rem; display: none; pointer-events: none; z-index: 5;
            white-space: nowrap;
        }
        #loading-text {
            position: absolute; color: white; font-size: 1.5rem; 
            top: 50%; left: 50%; transform: translate(-50%, -50%);
        }
    </style>
</head>
<body>

    <div id="game-container">
        <canvas id="gameCanvas" width="256" height="144"></canvas>
        <div id="loading-text">Memuat Aset... 0%</div>
        <div id="alert-msg">Pesan Notifikasi</div>
        
        <div id="menu-overlay" class="overlay">
            <button class="menu-btn" id="btn-keluar">Keluar</button>
            <button class="menu-btn" id="btn-lanjut">Lanjutkan Simulasi</button>
        </div>

        <div id="overfill-overlay" class="overlay">
            <div id="overfill-popup">
                <img src="popupg.png" id="overfill-img" alt="Overfill">
                <button id="btn-ulangi"></button>
            </div>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const alertMsg = document.getElementById('alert-msg');
        const loadingText = document.getElementById('loading-text');

        // =====================================================
        // SISTEM LOAD GAMBAR
        // =====================================================
        const images = {};
        const sources = {
            bg: 'kanvasmeja.png', ui: 'tombolmenu.png', popupg: 'popupg.png',
            b_closed: 'bit.png', b_open: 'bib.png', b_empty: 'bkb.png',
            p0: 'pv0.png', p1: 'pv1.png', p2: 'pv2.png', p3: 'pv3.png', p4: 'pv4.png', p5: 'pv5.png',
            l: 'l.png', la: 'la.png', laa: 'laa.png', laaa: 'laaa.png', laaaa: 'laaaa.png',
            lb: 'lb.png', lbb: 'lbb.png', lbbb: 'lbbb.png', lbbbb: 'lbbbb.png',
            lab: 'lab.png', laabb: 'laabb.png',
            ppb: 'ppb.png', ppp: 'ppp.png', pppb: 'pppb.png'
        };

        let loadedImages = 0;
        let failedImages = 0;
        const totalImages = Object.keys(sources).length;
        let assetsReady = false;
        let rafId = null;

        for (let key in sources) {
            images[key] = new Image();
            images[key].src = sources[key];
            images[key].onload = () => { 
                loadedImages++; 
                updateLoadProgress();
            };
            // FIX: Tangani gambar yang gagal dimuat agar tidak memblokir game
            images[key].onerror = () => {
                failedImages++;
                loadedImages++;
                console.warn(`Gagal memuat gambar: ${sources[key]}`);
                updateLoadProgress();
            };
        }

        function updateLoadProgress() {
            const percent = Math.floor((loadedImages / totalImages) * 100);
            loadingText.innerText = `Memuat Aset... ${percent}%`;
            if (loadedImages === totalImages) {
                loadingText.style.display = 'none';
                assetsReady = true;
                // FIX: Loop render hanya dimulai SEKALI setelah semua aset selesai
                startRenderLoop();
            }
        }

        // =====================================================
        // STATE & INISIALISASI
        // =====================================================
        let bottles, pipettes, flask, indicator;

        function initGame() {
            // FIX: Posisi hitbox botol dikoreksi — botol B renderX:42 + hx:0 agar tidak overlap
            bottles = [
                { id: 'A', renderX: 0,  renderY: 0, hx: 42, hy: 80, hw: 35, hh: 55, state: 'closed', capacity: 5 },
                { id: 'B', renderX: 0,  renderY: 0, hx: 84, hy: 80, hw: 35, hh: 55, state: 'closed', capacity: 5 }
            ];

            flask = { 
                renderX: 0, renderY: 0, 
                hx: 130, hy: 80, hw: 45, hh: 55, 
                a: 0, b: 0, hasIndicator: false 
            };

            // FIX: Reset posisi indikator secara menyeluruh termasuk cap_renderX/Y
            indicator = {
                renderX: 0, renderY: 0, 
                hx: 190, hy: 95, hw: 30, hh: 40,
                cap_renderX: 0, cap_renderY: 0, 
                cap_hx: 190, cap_hy: 68, cap_hw: 30, cap_hh: 30,
                isDetached: false, location: 'base'
            };

            pipettes = [
                { id: 1, renderX: -10, renderY: 0, base_x: -10, base_y: 0, hx: 20, hy: 15, hw: 22, hh: 120, capacity: 0, tag: 'netral', location: 'rack' },
                { id: 2, renderX: 12,  renderY: 0, base_x: 12,  base_y: 0, hx: 20, hy: 15, hw: 22, hh: 120, capacity: 0, tag: 'netral', location: 'rack' }
            ];
        }

        initGame();

        let draggedObj = null; 
        let dragType = null;
        let dragOffsetX = 0, dragOffsetY = 0;
        let needsRedraw = true; // FIX: Flag dirty untuk render on-demand

        function markDirty() { needsRedraw = true; }

        // =====================================================
        // RENDER LOOP — FIX: Tidak lagi loop tak terbatas tanpa syarat
        // =====================================================
        function startRenderLoop() {
            function loop() {
                // Hanya gambar ulang jika ada perubahan ATAU sedang drag (animasi smooth)
                if (needsRedraw || draggedObj !== null) {
                    draw();
                    needsRedraw = false;
                }
                rafId = requestAnimationFrame(loop);
            }
            rafId = requestAnimationFrame(loop);
        }

        // =====================================================
        // FUNGSI RENDER
        // =====================================================
        function draw() {
            if (!assetsReady) return;
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            // Background
            if (images.bg.complete && images.bg.naturalWidth > 0) {
                ctx.drawImage(images.bg, 0, 0);
            }

            // Botol
            bottles.forEach(b => {
                let img;
                if (b.state === 'closed') {
                    img = images.b_closed;
                } else {
                    img = b.capacity > 0 ? images.b_open : images.b_empty;
                }
                if (img && img.complete && img.naturalWidth > 0) {
                    ctx.drawImage(img, b.renderX, b.renderY);
                }
            });

            // Labu
            const flaskSprite = getFlaskSprite();
            if (flaskSprite && flaskSprite.complete && flaskSprite.naturalWidth > 0) {
                ctx.drawImage(flaskSprite, flask.renderX, flask.renderY);
            }

            // Indikator
            if (indicator.isDetached) {
                if (images.ppb.complete) ctx.drawImage(images.ppb, indicator.renderX, indicator.renderY); 
                if (images.ppp.complete) ctx.drawImage(images.ppp, indicator.cap_renderX, indicator.cap_renderY); 
            } else {
                if (images.pppb.complete) ctx.drawImage(images.pppb, indicator.renderX, indicator.renderY); 
            }

            // Pipet
            pipettes.forEach(p => {
                let pImg = images['p' + p.capacity];
                if (pImg && pImg.complete && pImg.naturalWidth > 0) {
                    ctx.drawImage(pImg, p.renderX, p.renderY);
                }
            });

            // UI Menu (selalu di atas)
            if (images.ui.complete && images.ui.naturalWidth > 0) {
                ctx.drawImage(images.ui, 0, 0);
            }
        }

        function getFlaskSprite() {
            const total = flask.a + flask.b;
            if (total === 0) return images.l;

            if (!flask.hasIndicator) {
                // Tanpa indikator: tampilkan level cairan netral (warna A)
                if (total === 1) return images.la;
                if (total === 2) return images.laa;
                if (total === 3) return images.laaa;
                if (total === 4) return images.laaaa;
            } else {
                // Dengan indikator: warna bergantung pada komposisi A vs B
                if (flask.a === flask.b) {
                    // Titik ekuivalen — warna campuran
                    if (total === 2) return images.lab;
                    if (total === 4) return images.laabb;
                } else if (flask.a > flask.b) {
                    // Dominan A
                    if (total === 1) return images.la;
                    if (total === 2) return images.laa;
                    if (total === 3) return images.laaa;
                    if (total === 4) return images.laaaa;
                } else {
                    // Dominan B
                    if (total === 1) return images.lb;
                    if (total === 2) return images.lbb;
                    if (total === 3) return images.lbbb;
                    if (total === 4) return images.lbbbb;
                }
            }
            return images.l;
        }

        // =====================================================
        // HELPER: Koordinat (Mouse & Touch)
        // =====================================================
        function getPos(e) {
            const rect = canvas.getBoundingClientRect();
            const scaleX = canvas.width / rect.width;
            const scaleY = canvas.height / rect.height;
            let clientX, clientY;

            // FIX: touchend menggunakan changedTouches, bukan touches (sudah kosong saat touchend)
            if (e.changedTouches && e.changedTouches.length > 0) {
                clientX = e.changedTouches[0].clientX;
                clientY = e.changedTouches[0].clientY;
            } else if (e.touches && e.touches.length > 0) {
                clientX = e.touches[0].clientX;
                clientY = e.touches[0].clientY;
            } else {
                clientX = e.clientX;
                clientY = e.clientY;
            }
            return { 
                x: (clientX - rect.left) * scaleX, 
                y: (clientY - rect.top) * scaleY 
            };
        }

        let toastTimer = null;
        function showToast(msg) {
            alertMsg.innerText = msg;
            alertMsg.style.display = 'block';
            // FIX: Bersihkan timer lama agar toast tidak tumpang tindih
            if (toastTimer) clearTimeout(toastTimer);
            toastTimer = setTimeout(() => { 
                alertMsg.style.display = 'none'; 
                toastTimer = null;
            }, 2000);
        }

        function checkOverlap(r1, r2) {
            return (
                r1.x < r2.x + r2.w &&
                r1.x + r1.w > r2.x &&
                r1.y < r2.y + r2.h &&
                r1.y + r1.h > r2.y
            );
        }

        // =====================================================
        // EVENT HANDLERS
        // =====================================================
        function handleStart(e) {
            if (e.cancelable) e.preventDefault();
            const pos = getPos(e);
            const mouseX = pos.x, mouseY = pos.y;

            // Tombol Menu (pojok kanan atas)
            if (mouseX >= 232 && mouseX <= 252 && mouseY >= 4 && mouseY <= 22) {
                document.getElementById('menu-overlay').style.display = 'flex';
                return;
            }

            // Cek pipet (dari atas ke bawah untuk prioritas yang benar)
            for (let i = pipettes.length - 1; i >= 0; i--) {
                const p = pipettes[i];
                const px = p.renderX + p.hx;
                const py = p.renderY + p.hy;
                if (mouseX >= px && mouseX <= px + p.hw && mouseY >= py && mouseY <= py + p.hh) {
                    if (mouseY <= py + 35) {
                        // Area bulb (bagian atas) → aksi sedot/tuang
                        handlePipetteBulb(p);
                    } else {
                        // Area badan → drag
                        draggedObj = p;
                        dragType = 'pipette';
                        dragOffsetX = mouseX - p.renderX;
                        dragOffsetY = mouseY - p.renderY;
                    }
                    return;
                }
            }

            // Cek tutup indikator
            // FIX: Hitung posisi tutup berdasarkan state isDetached dengan benar
            const capRX = indicator.isDetached ? indicator.cap_renderX : indicator.renderX;
            const capRY = indicator.isDetached ? indicator.cap_renderY : indicator.renderY;
            const capX = capRX + indicator.cap_hx;
            const capY = capRY + indicator.cap_hy;

            if (mouseX >= capX && mouseX <= capX + indicator.cap_hw && mouseY >= capY && mouseY <= capY + indicator.cap_hh) {
                // Jika sudah di atas labu, teteskan indikator
                if (indicator.location === 'flask' && mouseY <= capY + 15) {
                    if (!flask.hasIndicator) {
                        flask.hasIndicator = true;
                        showToast("Indikator PP diteteskan!");
                        markDirty();
                    } else {
                        showToast("Indikator sudah diteteskan!");
                    }
                } else {
                    // Drag tutup indikator
                    indicator.isDetached = true;
                    draggedObj = indicator;
                    dragType = 'indicator';
                    // FIX: Offset dihitung dari posisi cap yang sesungguhnya
                    dragOffsetX = mouseX - capRX;
                    dragOffsetY = mouseY - capRY;
                }
                return;
            }

            // Cek klik botol (buka/tutup)
            bottles.forEach(b => {
                const bx = b.renderX + b.hx;
                const by = b.renderY + b.hy;
                if (mouseX >= bx && mouseX <= bx + b.hw && mouseY >= by && mouseY <= by + b.hh) {
                    b.state = (b.state === 'closed') ? 'open' : 'closed';
                    markDirty();
                }
            });
        }

        function handleMove(e) {
            if (!draggedObj) return;
            if (e.cancelable) e.preventDefault();
            const pos = getPos(e);

            if (dragType === 'pipette') {
                draggedObj.renderX = pos.x - dragOffsetX;
                draggedObj.renderY = pos.y - dragOffsetY;
            } else if (dragType === 'indicator') {
                // FIX: Sinkronkan cap_renderX/Y saat drag
                draggedObj.cap_renderX = pos.x - dragOffsetX;
                draggedObj.cap_renderY = pos.y - dragOffsetY;
            }
        }

        function handleEnd(e) {
            if (!draggedObj) return;
            if (e.cancelable) e.preventDefault();
            let droppedOnTarget = false;

            if (dragType === 'pipette') {
                const p = draggedObj;
                const pHit = { x: p.renderX + p.hx, y: p.renderY + p.hy, w: p.hw, h: p.hh };

                // Cek drop ke botol
                for (const b of bottles) {
                    const bHit = { x: b.renderX + b.hx, y: b.renderY + b.hy, w: b.hw, h: b.hh };
                    if (checkOverlap(pHit, bHit)) {
                        // FIX: Pipet dengan tag berbeda tidak bisa masuk botol lain
                        if (p.tag === 'netral' || p.tag === b.id) {
                            p.renderX = bHit.x + 8 - p.hx;
                            p.renderY = bHit.y - 45 - p.hy;
                            p.location = b.id;
                            droppedOnTarget = true;
                            break;
                        } else {
                            showToast(`Pipet ini sudah digunakan untuk larutan ${p.tag}!`);
                            droppedOnTarget = false;
                        }
                    }
                }

                // Cek drop ke labu
                if (!droppedOnTarget) {
                    const fHit = { x: flask.renderX + flask.hx, y: flask.renderY + flask.hy, w: flask.hw, h: flask.hh };
                    if (checkOverlap(pHit, fHit)) {
                        // FIX: Hanya pipet yang sudah terisi yang bisa diletakkan di labu
                        if (p.capacity > 0) {
                            p.renderX = fHit.x + 10 - p.hx;
                            p.renderY = fHit.y - 50 - p.hy;
                            p.location = 'flask';
                            droppedOnTarget = true;
                        } else {
                            showToast("Pipet kosong! Sedot larutan dari botol dulu.");
                        }
                    }
                }

                // Kembalikan ke rak jika tidak ada target
                if (!droppedOnTarget) {
                    if (p.capacity > 0) {
                        p.capacity = 0;
                        p.tag = 'netral';
                        showToast("Cairan tumpah ke meja!");
                    }
                    p.renderX = p.base_x;
                    p.renderY = p.base_y;
                    p.location = 'rack';
                }

                markDirty();

            } else if (dragType === 'indicator') {
                const ind = draggedObj;
                const capHit = { 
                    x: ind.cap_renderX + ind.cap_hx, 
                    y: ind.cap_renderY + ind.cap_hy, 
                    w: ind.cap_hw, h: ind.cap_hh 
                };
                const fHit = { 
                    x: flask.renderX + flask.hx, 
                    y: flask.renderY + flask.hy, 
                    w: flask.hw, h: flask.hh 
                };

                if (checkOverlap(capHit, fHit)) {
                    // Posisikan tutup di atas labu
                    ind.cap_renderX = fHit.x + 6 - ind.cap_hx;
                    ind.cap_renderY = fHit.y - 25 - ind.cap_hy;
                    ind.location = 'flask';
                } else {
                    // FIX: Kembalikan tutup ke botol indikator (isDetached = false)
                    ind.isDetached = false;
                    ind.cap_renderX = ind.renderX;
                    ind.cap_renderY = ind.renderY;
                    ind.location = 'base';
                }
                markDirty();
            }

            draggedObj = null;
            dragType = null;
        }

        // =====================================================
        // LOGIKA PIPET BULB
        // =====================================================
        function handlePipetteBulb(p) {
            // Sedot dari botol
            if (p.location === 'A' || p.location === 'B') {
                const bottle = bottles.find(b => b.id === p.location);
                if (!bottle) return;

                if (bottle.state !== 'open') {
                    showToast("Buka tutup botol dulu!");
                    return;
                }
                // FIX: Cek kapasitas botol dan pipet sebelum menyedot
                if (bottle.capacity <= 0) {
                    showToast("Botol sudah kosong!");
                    return;
                }
                if (p.capacity >= 5) {
                    showToast("Pipet sudah penuh!");
                    return;
                }
                p.capacity++;
                bottle.capacity--;
                p.tag = bottle.id;
                markDirty();

            } else if (p.location === 'flask') {
                // Tuang ke labu
                // FIX: Kondisi yang benar adalah > 0 (bukan > 1) untuk bisa menuang
                if (p.capacity <= 0) {
                    showToast("Pipet sudah kosong!");
                    return;
                }
                const totalFlask = flask.a + flask.b;
                if (totalFlask >= 4) {
                    document.getElementById('overfill-overlay').style.display = 'flex';
                    return;
                }
                p.capacity--;
                if (p.tag === 'A') flask.a++;
                else if (p.tag === 'B') flask.b++;
                markDirty();

            } else {
                // Pipet di rak, tidak bisa digunakan
                showToast("Pindahkan pipet ke botol atau labu dulu!");
            }
        }

        // =====================================================
        // EVENT LISTENERS
        // =====================================================
        canvas.addEventListener('mousedown', handleStart);
        canvas.addEventListener('mousemove', handleMove);
        canvas.addEventListener('mouseup', handleEnd);
        canvas.addEventListener('mouseleave', handleEnd);

        canvas.addEventListener('touchstart', handleStart, { passive: false });
        canvas.addEventListener('touchmove', handleMove, { passive: false });
        canvas.addEventListener('touchend', handleEnd, { passive: false });

        // Tombol overlay
        document.getElementById('btn-lanjut').addEventListener('click', () => {
            document.getElementById('menu-overlay').style.display = 'none';
        });

        document.getElementById('btn-keluar').addEventListener('click', () => {
            // FIX: Gunakan konfirmasi sebelum keluar
            if (confirm("Yakin ingin keluar dari simulasi?")) {
                if (rafId) cancelAnimationFrame(rafId);
                alert("Simulasi diakhiri.");
            }
        });

        document.getElementById('btn-ulangi').addEventListener('click', () => {
            initGame();
            document.getElementById('overfill-overlay').style.display = 'none';
            markDirty();
        });

    </script>
</body>
</html>
